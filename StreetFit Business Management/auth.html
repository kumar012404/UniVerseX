<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auth | StreetFit Business Manager</title>
    <link rel="icon" type="image/svg+xml"
        href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='black'/%3E%3Cdefs%3E%3ClinearGradient id='gold' x1='0%25' y1='0%25' x2='100%25' y2='100%25'%3E%3Cstop offset='0%25' style='stop-color:%23FFD700;stop-opacity:1' /%3E%3Cstop offset='50%25' style='stop-color:%23D4AF37;stop-opacity:1' /%3E%3Cstop offset='100%25' style='stop-color:%23B8860B;stop-opacity:1' /%3E%3C/linearGradient%3E%3C/defs%3E%3Ctext x='50%25' y='72%25' text-anchor='middle' font-family='Outfit, Arial Black, sans-serif' font-weight='900' font-size='60' font-style='italic' fill='url(%23gold)' style='filter:drop-shadow(2px 2px 2px rgba(0,0,0,0.5))'%3ESF%3C/text%3E%3C/svg%3E">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
</head>

<body>
    <div class="auth-container">
        <div class="auth-card">
            <h1 class="text-gold"
                style="font-style: italic; font-weight: 900; font-size: 2.5rem; letter-spacing: -1.5px; width: 100%; text-align: center; margin-bottom: 0.25rem;">
                StreetFit</h1>
            <p>Business Management Workspace</p>

            <form id="authForm">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" placeholder="Ex: kumar" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="••••••••" required>
                </div>
                <button type="submit" id="submitBtn" class="btn btn-primary">Sign In</button>
                <button type="button" id="toggleAuth" class="btn btn-ghost"
                    style="margin-top: 0.5rem; font-size: 0.875rem;">
                    Don't have an account? Sign Up
                </button>
            </form>

            <div id="authError" class="badge badge-rejected hidden"
                style="margin-top: 1rem; text-align: center; display: block;"></div>

            <a href="index.html" class="btn btn-ghost" style="margin-top: 1rem; font-size: 0.875rem;">
                <i class="fas fa-arrow-left" style="margin-right: 0.5rem;"></i> Back to Home
            </a>
        </div>
    </div>

    <script src="firebase-config.js"></script>
    <script>
        let isLogin = true;
        const authForm = document.getElementById('authForm');
        const submitBtn = document.getElementById('submitBtn');
        const toggleBtn = document.getElementById('toggleAuth');
        const errorDiv = document.getElementById('authError');

        toggleBtn.addEventListener('click', () => {
            isLogin = !isLogin;
            submitBtn.textContent = isLogin ? 'Sign In' : 'Sign Up';
            toggleBtn.textContent = isLogin ? "Don't have an account? Sign Up" : "Already have an account? Sign In";
            errorDiv.classList.add('hidden');
        });

        authForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;

            errorDiv.classList.add('hidden');
            submitBtn.disabled = true;
            submitBtn.textContent = 'Processing...';

            try {
                let result;

                // 15 second timeout — stops infinite "Processing..."
                const timeoutPromise = new Promise((_, reject) =>
                    setTimeout(() => reject(new Error('TIMEOUT')), 15000)
                );

                const authCall = isLogin
                    ? window.auth.login(username, password)
                    : window.auth.signup(username, password);

                result = await Promise.race([authCall, timeoutPromise]);

                if (result && result.error) {
                    errorDiv.textContent = '❌ ' + result.error.message;
                    errorDiv.classList.remove('hidden');
                } else {
                    window.location.href = 'index.html';
                }
            } catch (err) {
                console.error("Auth Error:", err);
                if (err.message === 'TIMEOUT') {
                    errorDiv.textContent = '⏱ Request timed out. Check your internet and try again.';
                } else if (err.message && (err.message.includes('fetch') || err.message.includes('network'))) {
                    errorDiv.textContent = '🌐 Network error — Cannot reach server. Try switching to WiFi.';
                } else {
                    errorDiv.textContent = '❌ ' + (err.message || 'Unknown error.');
                }
                errorDiv.classList.remove('hidden');
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = isLogin ? 'Sign In' : 'Sign Up';
            }
        });

        window.addEventListener('load', async () => {
            const user = await window.auth.getCurrentUser();
            // Only auto-redirect if already logged in as ADMIN
            if (user && user.profile && user.profile.role === 'admin') {
                window.location.href = 'index.html';
            }
        });
    </script>
</body>

</html>
